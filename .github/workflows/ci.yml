name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup OASIS schemas
        run: npm run schemas:setup

      - name: Setup profile artifacts
        run: npm run schemas:profiles:fetch

      - name: Download DIAN fixtures
        run: npm run fixtures:dian

      - name: Build and test with coverage
        run: npm run test:coverage
