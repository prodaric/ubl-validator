name: Release

# Publica en npm cuando se publica un GitHub Release (no al crear solo el tag).
# Flujo: bump version en package.json → commit → tag v* → gh release create → npm publish.
on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    name: Test & publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup OASIS schemas
        run: npm run schemas:setup

      - name: Setup profile artifacts
        run: npm run schemas:profiles:fetch

      - name: Verify vendored DIAN fixtures
        run: npm run fixtures:dian:verify

      - name: Verify version matches release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::package.json ($PKG) no coincide con el tag de release ($VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_ENV"

      - name: Test with coverage
        run: npm run test:coverage

      - name: Determine dist-tag
        id: tag
        run: |
          VERSION="${{ env.version }}"
          if echo "$VERSION" | grep -Eq 'alpha|beta|rc'; then
            if echo "$VERSION" | grep -q alpha; then echo "dist=alpha" >> "$GITHUB_OUTPUT"
            elif echo "$VERSION" | grep -q beta; then echo "dist=beta" >> "$GITHUB_OUTPUT"
            else echo "dist=rc" >> "$GITHUB_OUTPUT"; fi
          else
            echo "dist=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify npm token
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::Secret NPM_TOKEN no configurado. Ejecuta: gh secret set NPM_TOKEN -R prodaric/ubl-validator"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.tag.outputs.dist }} --ignore-scripts
